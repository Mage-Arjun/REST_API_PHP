name: Daily Auto Commit

on:
  workflow_dispatch:        # allows manual run
  schedule:
    - cron: "0 10 * * *"   # daily at 10:00 UTC

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # we’ll provide our own token

      - name: Update file
        run: echo "Updated on $(date)" >> log.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Mage-Arjun/REST_API_PHP.git
          git fetch origin master
          git reset --soft origin/master
          git add .
          git commit -m "Automated daily commit" || echo "No changes"
          git push origin HEAD:master --force
