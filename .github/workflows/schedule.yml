name: Daily Auto Commit

on:
  workflow_dispatch:        # allows manual run
  schedule:
    - cron: "0 10 * * *"   # daily at 10:00 UTC

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # use our own token

      # 2️⃣ Update or create a file
      - name: Update file
        run: |
          echo "Updated on $(date)" >> log.txt

      # 3️⃣ Commit and push changes
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Mage-Arjun/REST_API_PHP.git
          git fetch origin main
          git reset --soft origin/main
          git add .
          git diff --cached --quiet || git commit -m "Automated daily commit"
          git push origin HEAD:main
