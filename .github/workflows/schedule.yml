name: Daily Auto Commit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update file
        run: echo "Updated on $(date)" >> log.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Automated daily commit" || echo "No changes"
          git push
